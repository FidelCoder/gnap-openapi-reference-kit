openapi: 3.1.0
info:
  title: Outgoing Payment GNAP Example
  version: 0.1.0
servers:
  - url: https://resource.wallet.example
components:
  securitySchemes:
    openPaymentsGNAP:
      type: http
      scheme: bearer
      x-gnap:
        grantEndpoint: https://auth.wallet.example
        supportsInteraction: true
        supportsContinuation: true
        proof:
          method: httpsig
          alg: ed25519
paths:
  /.well-known/pay/{walletId}:
    get:
      operationId: discoverWalletAddress
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet address metadata.
  /quotes:
    post:
      operationId: createQuote
      security:
        - openPaymentsGNAP: []
      x-gnap-access:
        type: quote
        actions:
          - create
          - read
      responses:
        "201":
          description: Quote created.
  /outgoing-payments:
    post:
      operationId: createOutgoingPayment
      security:
        - openPaymentsGNAP: []
      x-gnap-access:
        type: outgoing-payment
        actions:
          - create
          - read
      responses:
        "201":
          description: Outgoing payment created.
  /outgoing-payments/{id}:
    get:
      operationId: readOutgoingPayment
      security:
        - openPaymentsGNAP: []
      x-gnap-access:
        type: outgoing-payment
        actions:
          - read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Outgoing payment state.
