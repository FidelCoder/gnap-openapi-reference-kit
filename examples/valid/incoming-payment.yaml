openapi: 3.1.0
info:
  title: Incoming Payment GNAP Example
  version: 0.1.0
servers:
  - url: https://resource.wallet.example
components:
  securitySchemes:
    openPaymentsGNAP:
      type: http
      scheme: bearer
      x-gnap:
        grantEndpoint: https://auth.wallet.example
        supportsInteraction: true
        supportsContinuation: true
        proof:
          method: httpsig
          alg: ed25519
paths:
  /incoming-payments:
    post:
      operationId: createIncomingPayment
      security:
        - openPaymentsGNAP: []
      x-gnap-access:
        type: incoming-payment
        actions:
          - create
          - read
      responses:
        "201":
          description: Incoming payment created.
  /incoming-payments/{id}:
    get:
      operationId: readIncomingPayment
      security:
        - openPaymentsGNAP: []
      x-gnap-access:
        type: incoming-payment
        actions:
          - read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Incoming payment state.
