openapi: 3.1.0
info:
  title: Missing GNAP Extension Example
  version: 0.1.0
components:
  securitySchemes:
    openPaymentsGNAP:
      type: http
      scheme: bearer
paths:
  /incoming-payments:
    post:
      operationId: createIncomingPayment
      security:
        - openPaymentsGNAP: []
      responses:
        "201":
          description: Incoming payment created.
