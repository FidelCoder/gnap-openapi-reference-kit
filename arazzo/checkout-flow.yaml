arazzo: 1.0.1
info:
  title: Checkout Flow
  version: 0.1.0
sourceDescriptions:
  - name: openpayments
    url: ../examples/valid/openpayments-gnap.yaml
    type: openapi
workflows:
  - workflowId: checkoutFlow
    description: Merchant creates an incoming payment, payer quotes it, then creates an outgoing payment.
    steps:
      - stepId: requestIncomingPaymentGrant
        description: Merchant requests incoming-payment access.
      - stepId: createCheckoutIncomingPayment
        operationId: createIncomingPayment
        requestBody:
          $ref: ../fixtures/payments/create-incoming-payment.request.json
        successCriteria:
          - condition: $statusCode == 201
      - stepId: requestPayerGrant
        description: Payer requests quote and outgoing-payment access.
      - stepId: createCheckoutQuote
        operationId: createQuote
        requestBody:
          $ref: ../fixtures/payments/create-quote.request.json
        successCriteria:
          - condition: $statusCode == 201
      - stepId: createCheckoutOutgoingPayment
        operationId: createOutgoingPayment
        requestBody:
          $ref: ../fixtures/payments/create-outgoing-payment.request.json
        successCriteria:
          - condition: $statusCode == 201
